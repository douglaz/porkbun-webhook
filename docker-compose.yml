version: '3.8'

services:
  porkbun-webhook:
    image: ghcr.io/douglaz/porkbun-webhook:latest
    container_name: porkbun-webhook
    environment:
      # Required: Your Porkbun API credentials
      PORKBUN_API_KEY: ${PORKBUN_API_KEY}
      PORKBUN_SECRET_API_KEY: ${PORKBUN_SECRET_API_KEY}

      # Optional: Porkbun API base URL
      PORKBUN_API_BASE: ${PORKBUN_API_BASE:-https://api.porkbun.com/api/json/v3}

      # Optional: Comma-separated list of domains to manage
      # Omit or leave unset to manage all domains with API access in your Porkbun account
      # DOMAIN_FILTER: example.com,example.org
      DOMAIN_FILTER: ${DOMAIN_FILTER-}

      # Webhook server configuration
      WEBHOOK_HOST: ${WEBHOOK_HOST:-0.0.0.0}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8888}

      # Logging level: trace, debug, info, warn, error
      RUST_LOG: ${RUST_LOG:-info}

      # Dry run mode - set to true to test without making changes
      DRY_RUN: ${DRY_RUN:-false}

      # Cache TTL for domain list (seconds)
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}

      # HTTP timeout for Porkbun API calls (seconds)
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-30}

      # Enable request body tracing (debug only)
      TRACE_REQUEST_BODIES: ${TRACE_REQUEST_BODIES:-false}

    ports:
      # Expose webhook port
      - "${WEBHOOK_EXTERNAL_PORT:-8888}:8888"

    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: External-DNS container for local testing
  # Uncomment to run external-dns alongside the webhook
  # external-dns:
  #   image: registry.k8s.io/external-dns/external-dns:v0.14.0
  #   container_name: external-dns
  #   command:
  #     - --source=service
  #     - --source=ingress
  #     - --provider=webhook
  #     - --webhook-provider-url=http://porkbun-webhook:8888
  #     - --domain-filter=${DOMAIN_FILTER:-}
  #     - --registry=txt
  #     - --txt-owner-id=external-dns
  #     - --log-level=info
  #     - --interval=30s
  #   depends_on:
  #     - porkbun-webhook
  #   restart: unless-stopped

# Optional: Create a network for better isolation
networks:
  default:
    name: external-dns-network
    driver: bridge
