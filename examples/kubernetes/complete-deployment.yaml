# Complete Porkbun Webhook + External-DNS Deployment for Kubernetes
# This manifest creates everything needed to use External-DNS with Porkbun domains
#
# IMPORTANT: Porkbun requires API access to be enabled per domain.
# Go to your Porkbun domain management page and enable "API Access"
# for each domain you want to manage with this webhook.
---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    name: external-dns
---
# Store your Porkbun API credentials securely
# Get your API key and secret from: https://porkbun.com/account/api
apiVersion: v1
kind: Secret
metadata:
  name: porkbun-api-credentials
  namespace: external-dns
type: Opaque
stringData:
  # IMPORTANT: Replace with your actual Porkbun API key and secret
  api-key: "your-porkbun-api-key-here"
  secret-api-key: "your-porkbun-secret-api-key-here"
---
# ServiceAccount for External-DNS
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns
---
# ClusterRole with necessary permissions for External-DNS
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
rules:
- apiGroups: [""]
  resources: ["services", "endpoints", "pods"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["extensions", "networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "watch", "list"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
---
# Bind the ClusterRole to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
- kind: ServiceAccount
  name: external-dns
  namespace: external-dns
---
# Deploy the Porkbun Webhook server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: porkbun-webhook
  namespace: external-dns
  labels:
    app: porkbun-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: porkbun-webhook
  template:
    metadata:
      labels:
        app: porkbun-webhook
    spec:
      containers:
      - name: porkbun-webhook
        # Use a specific version tag for production
        image: ghcr.io/douglaz/porkbun-webhook:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8888
          protocol: TCP
        env:
        # Required: Porkbun API credentials
        - name: PORKBUN_API_KEY
          valueFrom:
            secretKeyRef:
              name: porkbun-api-credentials
              key: api-key
        - name: PORKBUN_SECRET_API_KEY
          valueFrom:
            secretKeyRef:
              name: porkbun-api-credentials
              key: secret-api-key
        # Webhook server configuration
        - name: WEBHOOK_HOST
          value: "0.0.0.0"
        - name: WEBHOOK_PORT
          value: "8888"
        # IMPORTANT: Update with your domains
        # API access must be enabled for each domain in Porkbun dashboard
        - name: DOMAIN_FILTER
          value: "example.com,example.org"
        # Logging configuration
        - name: RUST_LOG
          value: "info"
        # Set to true to test without making actual changes
        - name: DRY_RUN
          value: "false"
        # Health checks
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8888
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8888
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
# Service to expose the webhook within the cluster
apiVersion: v1
kind: Service
metadata:
  name: porkbun-webhook
  namespace: external-dns
  labels:
    app: porkbun-webhook
spec:
  type: ClusterIP
  selector:
    app: porkbun-webhook
  ports:
  - name: http
    port: 8888
    targetPort: 8888
    protocol: TCP
---
# Deploy External-DNS configured to use the webhook
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
  labels:
    app: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.14.0
        args:
        # Sources to watch for DNS entries
        - --source=ingress
        - --source=service
        # Webhook provider configuration
        - --provider=webhook
        - --webhook-provider-url=http://porkbun-webhook:8888
        # IMPORTANT: Update with your domains
        # Must match the DOMAIN_FILTER in porkbun-webhook
        - --domain-filter=example.com
        - --domain-filter=example.org
        # TXT registry for ownership records
        - --registry=txt
        - --txt-owner-id=porkbun-webhook
        - --txt-prefix=_externaldns.
        # Sync configuration
        - --interval=1m
        - --log-level=info
        - --log-format=text
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
